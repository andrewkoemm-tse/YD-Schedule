<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Molding Schedule Display</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-align: center;
      color: #00adee;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 26px;
    }

    th {
      background: #333;
      padding: 14px;
      text-align: left;
      font-size: 30px;
      border-bottom: 3px solid #555;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #444;
    }

    tr:nth-child(even) {
      background: #1a1a1a;
    }

    tr:nth-child(odd) {
      background: #222;
    }
  </style>
</head>

<body>

<h1>Molding Schedule</h1>

<table id="data-table"></table>

<!-- Embedded PapaParse (minified) -->
<script>
/*! papaparse.min.js (embedded for offline use) */

<script>
async function loadCSV() {
  try {
    const response = await fetch("Molding%20Schedule%28For%20TV%29.csv");
    const text = await response.text();

    const parsed = Papa.parse(text).data;

    const table = document.getElementById("data-table");

    // Remove empty rows
    const rows = parsed.filter(r => r.some(cell => cell.trim() !== ""));

    // Header
    const headerRow = document.createElement("tr");
    rows[0].forEach(col => {
      const th = document.createElement("th");
      th.textContent = col;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    // Data rows
    for (let i = 1; i < rows.length; i++) {
      const tr = document.createElement("tr");
      rows[i].forEach(col => {
        const td = document.createElement("td");
        td.textContent = col;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    }

  } catch (err) {
    console.error("Error loading CSV:", err);
  }
}

loadCSV();
</script>

</body>
</html>
